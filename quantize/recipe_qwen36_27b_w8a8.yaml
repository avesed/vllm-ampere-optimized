default_stage:
  default_modifiers:
    QuantizationModifier:
      config_groups:
        group_0:
          targets: [Linear]
          weights:
            num_bits: 8
            type: int
            symmetric: true
            strategy: channel
            dynamic: false
            observer: mse
          input_activations:
            num_bits: 8
            type: int
            symmetric: true
            strategy: token
            dynamic: true
            observer: null
          output_activations: null
          format: null
      targets: [Linear]
      ignore: [lm_head, 're:.*embed_tokens', 're:.*linear_attn[.]in_proj_a$', 're:.*linear_attn[.]in_proj_b$', 're:.*visual.*', 're:.*mtp.*']
      bypass_divisibility_checks: false
