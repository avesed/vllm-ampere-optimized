# Qwen/Qwen3.6-35B-A3B (MoE hybrid VL) — W8A8: int8 per-channel weights + int8 dynamic-per-token
# activations (symmetric). Mirrors the W4A16 scope: quantizes the MoE EXPERT FFNs only (int8); router
# (mlp.gate), shared_expert, self_attn, GatedDeltaNet (linear_attn), lm_head, vision, MTP stay bf16.
# int8 is robust → observer=mse weight quant (no AWQ); dynamic-per-token act needs no SmoothQuant.
default_stage:
  default_modifiers:
    QuantizationModifier:
      config_groups:
        group_0:
          targets: [Linear]
          weights:
            num_bits: 8
            type: int
            symmetric: true
            strategy: channel
            dynamic: false
            observer: mse
          input_activations:
            num_bits: 8
            type: int
            symmetric: true
            strategy: token
            dynamic: true
            observer: null
          output_activations: null
          format: null
      targets: [Linear]
      ignore: [lm_head, 're:.*embed_tokens', 're:.*linear_attn.*', 're:.*shared_expert.*',
        're:.*shared_expert_gate$', 're:.*mlp\.gate$', 're:.*self_attn.*', 're:model\.visual.*',
        're:mtp.*']
      bypass_divisibility_checks: false
