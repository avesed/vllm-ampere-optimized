default_stage:
  default_modifiers:
    AWQModifier:
      mappings:
      - smooth_layer: re:.*post_attention_layernorm$
        balance_layers: ['re:.*mlp[.]gate_proj$', 're:.*mlp[.]up_proj$']
        activation_hook_target: null
      - smooth_layer: re:.*mlp[.]up_proj$
        balance_layers: ['re:.*mlp[.]down_proj$']
        activation_hook_target: null
      - smooth_layer: re:.*layers\.(3|7|11|15|19|23|27|31|35|39|43|47|51|55|59|63)\.input_layernorm$
        balance_layers: ['re:.*self_attn[.]q_proj$', 're:.*self_attn[.]k_proj$', 're:.*self_attn[.]v_proj$']
        activation_hook_target: null
      duo_scaling: both
      n_grid: 20
    QuantizationModifier:
      config_groups:
        group_0:
          targets: [Linear]
          weights:
            num_bits: 4
            type: int
            symmetric: true
            group_size: 32
            strategy: group
            dynamic: false
            observer: mse
          input_activations: null
          output_activations: null
          format: null
      targets: [Linear]
      ignore: [lm_head, 're:.*embed_tokens', 're:.*linear_attn[.]in_proj_a$', 're:.*linear_attn[.]in_proj_b$', 're:.*visual.*', 're:.*mtp.*']
      bypass_divisibility_checks: false
