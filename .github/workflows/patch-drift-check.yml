name: patch-drift-check

# Early-warning canary for the vendored-fork model: every day (and on PRs touching the recipe),
# replay the edit recipe onto the LATEST upstream tags in throwaway temp checkouts. If any
# anchor/patch no longer applies, the recipe scripts fail loudly -> open a re-vendor issue.
# (This does NOT touch the committed vllm/ + flashinfer/ trees — it clones to temp dirs.)

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'patches/**'

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }

      - name: Resolve latest upstream tags
        id: up
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "vllm=$(gh api repos/vllm-project/vllm/releases/latest --jq .tag_name)" >> "$GITHUB_OUTPUT"
          echo "fi=$(gh api repos/flashinfer-ai/flashinfer/releases/latest --jq .tag_name)" >> "$GITHUB_OUTPUT"

      - name: Replay recipe onto latest vLLM ${{ steps.up.outputs.vllm }} (temp)
        run: |
          git clone --depth 1 --branch "${{ steps.up.outputs.vllm }}" https://github.com/vllm-project/vllm.git _vllm_check
          # 0001 (anchor-based, exits non-zero on skew) + 0002 (native, --check only)
          python3 patches/regenerate.py _vllm_check
          git apply --check -p1 --directory=_vllm_check patches/0002-marlin-int8-8row-decode-ampere.patch

      - name: Replay recipe onto latest FlashInfer ${{ steps.up.outputs.fi }} (temp)
        run: |
          git clone --depth 1 --branch "${{ steps.up.outputs.fi }}" https://github.com/flashinfer-ai/flashinfer.git _fi_check
          # apply_to_source.py asserts every anchor -> exits non-zero on skew
          python3 patches/flashinfer_int8/apply_to_source.py _fi_check

      - name: Open drift issue
        if: failure() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VTAG: ${{ steps.up.outputs.vllm }}
          FTAG: ${{ steps.up.outputs.fi }}
        run: |
          TITLE="recipe drift: edits no longer apply to vLLM $VTAG / FlashInfer $FTAG"
          if [ -z "$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number')" ]; then
            gh issue create --title "$TITLE" \
              --body "The vendored-fork edit recipe failed to replay onto the latest upstream tags. Refresh the anchors, then re-vendor: \`scripts/revendor.sh <vllm_tag> <flashinfer_tag>\`, review the diff, and open a PR to main (which triggers the from-source build). See patches/README.md."
          fi
