name: watch-upstream

# Polls vllm-project/vllm for a new stable release every 6h. When the latest tag
# differs from the committed UPSTREAM_VLLM_VERSION marker, dispatches build.yml.
# createWorkflowDispatch with the built-in GITHUB_TOKEN is the documented exception
# to the "no recursive trigger" rule, so no PAT is needed (requires actions: write).

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write          # required for createWorkflowDispatch

concurrency:
  group: watch-upstream
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get latest upstream stable vLLM tag
        id: up
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # /releases/latest excludes prereleases/drafts -> stable tag only (e.g. v0.23.0).
          TAG=$(gh api repos/vllm-project/vllm/releases/latest --jq .tag_name)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest upstream stable vLLM: $TAG"

      - name: Compare with marker
        id: cmp
        run: |
          LAST=$(cat UPSTREAM_VLLM_VERSION 2>/dev/null | tr -d '[:space:]' || echo none)
          echo "last-built: '$LAST'  latest: '${{ steps.up.outputs.tag }}'"
          if [ "${{ steps.up.outputs.tag }}" != "$LAST" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch build for the new tag
        if: steps.cmp.outputs.changed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              ref: context.ref,
              inputs: { vllm_tag: '${{ steps.up.outputs.tag }}' }
            })
            core.notice(`Dispatched build.yml for ${{ steps.up.outputs.tag }}`)
