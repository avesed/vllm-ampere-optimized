name: watch-upstream

# Polls vllm-project/vllm for a new stable release every 6h. In the vendored-fork model a new
# upstream release is NOT a rebuild — it needs RE-VENDORING (clone the new tag + replay the edit
# recipe via scripts/revendor.sh). So when the latest tag differs from the committed
# UPSTREAM_VLLM_VERSION marker, open a re-vendor issue for a human (the recipe can drift and needs
# review). There is no CI auto-build: after re-vendoring you build + push the image yourself locally
# (scripts/build_image_source.sh) — a self-hosted GPU runner on a public repo is a security risk.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: watch-upstream
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get latest upstream stable vLLM tag
        id: up
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # /releases/latest excludes prereleases/drafts -> stable tag only (e.g. v0.23.0).
          TAG=$(gh api repos/vllm-project/vllm/releases/latest --jq .tag_name)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest upstream stable vLLM: $TAG"

      - name: Compare with vendored marker
        id: cmp
        run: |
          LAST=$(cat UPSTREAM_VLLM_VERSION 2>/dev/null | tr -d '[:space:]' || echo none)
          echo "vendored: '$LAST'  latest: '${{ steps.up.outputs.tag }}'"
          if [ "${{ steps.up.outputs.tag }}" != "$LAST" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open re-vendor issue for the new tag
        if: steps.cmp.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.up.outputs.tag }}
        run: |
          TITLE="re-vendor: upstream vLLM $TAG available (vendored is $(cat UPSTREAM_VLLM_VERSION))"
          if [ -z "$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number')" ]; then
            gh issue create --title "$TITLE" \
              --body "Upstream vLLM \`$TAG\` is newer than the vendored \`$(cat UPSTREAM_VLLM_VERSION)\`. Re-vendor the fork: \`scripts/revendor.sh $TAG <flashinfer_tag>\` (replays the edit recipe; fails loudly if anchors drifted), review \`git diff\`, commit, then rebuild + push the image locally (\`OWNER=<you> scripts/build_image_source.sh\` — no CI auto-build). See patches/README.md."
          fi
