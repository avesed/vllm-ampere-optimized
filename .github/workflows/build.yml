name: build

# Ship upstream vLLM for Ampere with our patch series, using OFFICIAL upstream builds (no
# self-compile): a pip wheel via VLLM_USE_PRECOMPILED (GitHub Release) + an overlay Docker image
# FROM vllm/vllm-openai + our patch (ghcr.io). A from-source single-arch image is opt-in
# (set repo var BUILD_RUNNER). Dispatched by watch-upstream.yml on a new release, or manually.

on:
  workflow_dispatch:
    inputs:
      vllm_tag:
        description: 'Upstream vLLM tag to build (e.g. v0.23.0)'
        required: true
        type: string
      cuda_version:
        description: 'CUDA toolkit version for the image (13.0.2 -> cu130 default; 12.9.1 -> cu129 broad-compat)'
        required: false
        default: '13.0.2'
        type: string
  repository_dispatch:
    types: [build-vllm]

permissions:
  contents: write          # GH Release upload + marker commit
  packages: write          # ghcr.io push

concurrency:
  group: build-${{ inputs.vllm_tag || github.event.client_payload.vllm_tag }}
  cancel-in-progress: false

env:
  VLLM_TAG: ${{ inputs.vllm_tag || github.event.client_payload.vllm_tag }}
  CUDA_VERSION: ${{ inputs.cuda_version || '13.0.2' }}
  TORCH_CUDA_ARCH_LIST: '8.0 8.6'   # all Ampere: A100 (sm_80) + 3090/A40/A6000/A10 (sm_86)

jobs:
  # ---- 1. drift canary: do the patches still apply to this tag? gates everything ----
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: git apply --check the patch series
        run: |
          git clone --depth 1 --branch "$VLLM_TAG" https://github.com/vllm-project/vllm.git vllm
          cd vllm
          if ! git apply --check ../patches/*.patch; then
            echo "::error::patch series does not apply cleanly to $VLLM_TAG — refresh patches/ (see docs/PATCHING.md)"
            exit 1
          fi
          echo "patches apply cleanly to $VLLM_TAG"

  # ---- 2. fast-path wheel: pure-Python patch -> upstream precompiled .so, no CUDA build ----
  wheel-fastpath:
    needs: drift-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - name: Apply patches onto upstream tag
        run: bash scripts/apply_patches.sh "$VLLM_TAG"
      - name: Build fast-path wheel (VLLM_USE_PRECOMPILED)
        run: bash scripts/build_wheel_fastpath.sh
      - name: Publish wheel to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # gh CLI is preinstalled on the runner -> no Node action, no Node20/24 deprecation.
        run: |
          gh release create "${VLLM_TAG}-ampere" dist/*.whl \
            --target "${{ github.sha }}" \
            --title "vLLM ${VLLM_TAG} for Ampere (sm_80 + sm_86)" \
            --generate-notes \
          || gh release upload "${VLLM_TAG}-ampere" dist/*.whl --clobber

  # ---- 3a. DEFAULT image: OFFICIAL upstream image + our pure-Python patch, ZERO compile -> ghcr ----
  # Runs on plain ubuntu-latest in ~1-2 min (no CUDA build). Tags :<tag> and :latest.
  image-overlay:
    needs: drift-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push overlay image (no compile)
        env:
          OWNER: ${{ github.repository_owner }}
        run: bash scripts/build_image_overlay.sh
      - name: Smoke test the published image
        env:
          OWNER: ${{ github.repository_owner }}
        run: bash scripts/smoke_test.sh "ghcr.io/${OWNER,,}/vllm-ampere-optimized:${VLLM_TAG}"

  # ---- 3b. OPT-IN from-source single-arch (8.0/8.6) image: only when repo var BUILD_RUNNER is set ----
  # Use this on a self-hosted GPU runner (e.g. the 2x3090 box) if you specifically want a slimmed
  # 8.0/8.6-only fatbin. Tags :<tag>-ampere-cuXXX (the overlay owns :latest). Note: from-source
  # compile gives NO inference speedup over the overlay for a pure-Python patch — size/build-time only.
  image-source:
    needs: drift-check
    if: ${{ vars.BUILD_RUNNER != '' }}
    runs-on: ${{ vars.BUILD_RUNNER }}
    steps:
      - uses: actions/checkout@v5
      - name: Apply patches onto upstream tag
        run: bash scripts/apply_patches.sh "$VLLM_TAG"
      - name: Derive cuXXX tag from CUDA_VERSION
        id: cu
        run: echo "short=cu$(echo "$CUDA_VERSION" | cut -d. -f1,2 | tr -d '.')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push single-arch Ampere image
        env:
          OWNER: ${{ github.repository_owner }}
          CU: ${{ steps.cu.outputs.short }}
        run: bash scripts/build_image_ampere.sh
      - name: Smoke test the published image
        env:
          OWNER: ${{ github.repository_owner }}
          CU: ${{ steps.cu.outputs.short }}
        run: bash scripts/smoke_test.sh "ghcr.io/${OWNER,,}/vllm-ampere-optimized:${VLLM_TAG}-ampere-${CU}"

  # ---- 4. bump marker only when wheel + overlay image succeeded (so a partial fail retries) ----
  bump-marker:
    needs: [wheel-fastpath, image-overlay]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Commit UPSTREAM_VLLM_VERSION = ${{ env.VLLM_TAG }}
        run: |
          echo "$VLLM_TAG" > UPSTREAM_VLLM_VERSION
          git config user.name  "vllm-ampere-ci"
          git config user.email "ci@users.noreply.github.com"
          if git diff --quiet UPSTREAM_VLLM_VERSION; then
            echo "marker already up to date"; exit 0
          fi
          git add UPSTREAM_VLLM_VERSION
          git commit -m "ci: built vLLM ${VLLM_TAG} for Ampere"
          git push
