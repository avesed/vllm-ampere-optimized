name: build

# Vendored-fork model: this repo carries the COMPLETE fork as source — vllm/ (upstream v0.23.0 +
# W4A8 Marlin + int8-8row decode + int8qk_backend, all baked in) and flashinfer/ (v0.6.12 + int8-QK).
# When main changes, do a COMPLETE FROM-SOURCE build of that vendored source (sm_80 + sm_86) and push
# to ghcr. There is no patch-overlay / upstream-clone path here anymore: the int8 work is NATIVE
# (.cuh/.cu in flashinfer + Marlin) which a pure-Python overlay cannot carry — it ships only from source.
# Upstream bumps are handled out-of-band by re-vendoring (clone fresh upstream + replay the edit recipe:
# patches/regenerate.py + patches/0002 + patches/flashinfer_int8/apply_to_source.py) as a PR to main,
# which then triggers this build. See patches/README.md.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/watch-upstream.yml'
      - '.github/workflows/patch-drift-check.yml'
  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA toolkit version (13.0.2 -> cu130 default; 12.9.1 -> cu129 broad-compat)'
        required: false
        default: '13.0.2'
        type: string

permissions:
  contents: read
  packages: write          # ghcr.io push

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  CUDA_VERSION: ${{ inputs.cuda_version || '13.0.2' }}
  TORCH_CUDA_ARCH_LIST: '8.0 8.6'   # all Ampere: A100 (sm_80) + 3090/A40/A6000/A10 (sm_86)

jobs:
  # Complete from-source build of the vendored fork. Needs a self-hosted GPU/CUDA runner
  # (set repo var BUILD_RUNNER, e.g. the 2x3090 box) — a from-source vLLM CUDA build is far too
  # heavy for ubuntu-latest. If BUILD_RUNNER is unset, the build is skipped (nothing to run on).
  build-source:
    if: ${{ vars.BUILD_RUNNER != '' }}
    runs-on: ${{ vars.BUILD_RUNNER }}
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build complete fork image from vendored source (vllm/ + flashinfer/ int8-QK)
        env:
          OWNER: ${{ github.repository_owner }}
        run: bash scripts/build_image_source.sh

      - name: Derive cuXXX tag
        id: cu
        run: echo "short=cu$(echo "$CUDA_VERSION" | cut -d. -f1,2 | tr -d '.')" >> "$GITHUB_OUTPUT"

      - name: Smoke test the published image
        env:
          OWNER: ${{ github.repository_owner }}
          CU: ${{ steps.cu.outputs.short }}
        run: |
          TAG="$(cat UPSTREAM_VLLM_VERSION)-ampere-${CU}"
          bash scripts/smoke_test.sh "ghcr.io/${OWNER,,}/vllm-ampere-optimized:${TAG}"

      - name: Ampere kernel CI (mamba/GDN/causal-conv1d Triton) + runtime-path assertions
        env:
          OWNER: ${{ github.repository_owner }}
          CU: ${{ steps.cu.outputs.short }}
        run: |
          IMG="ghcr.io/${OWNER,,}/vllm-ampere-optimized:$(cat UPSTREAM_VLLM_VERSION)-ampere-${CU}"
          bash scripts/ampere_kernel_ci.sh "$IMG" "$(cat UPSTREAM_VLLM_VERSION)"
          bash scripts/ampere_defaults_check.sh "$IMG"
